# CredScan Configuration
# ---------------------

# Scanning options
scan_path: "."
max_workers: 4
verbose: false

# File handling
exclude_patterns:
  - "vendor/"
  - "node_modules/"
  - ".git/"
  - "test/"
  - "tests/"
  - "example/"
  - "examples/"

# Output options
output_formats:
  - "console"
  - "json"
output_directory: "./reports"
disable_colors: false

# Detection settings
min_length: 8
use_enhanced_patterns: true  # Use enhanced pattern library by default

# Analyzer settings
enable_entropy: true
entropy_threshold: 4.2
min_string_length: 10
max_string_length: 120

# Parser settings
code_extensions:
  - ".py"
  - ".js"
  - ".java"
  - ".go"
  - ".php"
  - ".rb"
  - ".cs"
  - ".cpp"
  - ".c"
  - ".h"
  - ".swift"
  - ".kt"
  - ".ts"
  - ".sh"
  - ".bash"
  - ".txt"  # Added support for text files

# Enhanced pattern detection settings
enhanced_patterns:
  enabled: true  # Enhanced patterns enabled by default
  # pattern_library_path: "custom_patterns.yaml"  # Optional custom pattern library
  enabled_pattern_categories:  # Specific categories to enable (default: all)
    - "aws"
    - "google"
    - "github"
    - "slack"
    - "stripe"
    - "azure"
    - "docker"
    - "generic"
  # disabled_pattern_categories: []  # Categories to disable
  min_confidence_threshold: 0.7  # Minimum confidence for pattern matches
  severity_threshold: "medium"  # Minimum severity to report
