name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=credscan --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  self-scan:
    name: Self-Scan (dogfood)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install credscan
        run: pip install -e .

      - name: Scan this repository for leaked credentials
        run: |
          credscan --path . \
            --exclude ".git/,.github/,tests/testdata/,*.pyc" \
            --output json \
            --output-dir /tmp/scan-results \
            --min-confidence 0.5 || true

      - name: Check scan results
        run: |
          if ls /tmp/scan-results/*.json 2>/dev/null; then
            FINDINGS=$(python3 -c "
          import json, glob, sys
          files = glob.glob('/tmp/scan-results/*.json')
          if not files:
              print('0')
              sys.exit(0)
          data = json.load(open(files[0]))
          findings = [f for f in data.get('findings', []) if f.get('severity') in ('critical', 'high')]
          print(len(findings))
          ")
            echo "High/critical findings: $FINDINGS"
            if [ "$FINDINGS" -gt "0" ]; then
              echo "::warning::$FINDINGS high/critical credential findings in repository"
            fi
          fi

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install black isort

      - name: Check formatting (black)
        run: black --check src/

      - name: Check imports (isort)
        run: isort --check-only src/
