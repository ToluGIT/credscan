name: "CredScan"
description: "Scan a repository for hard-coded credentials and secrets, with SARIF output for GitHub code scanning."
author: "ToluGIT"
branding:
  icon: "shield"
  color: "red"

inputs:
  path:
    description: "Path to scan."
    required: false
    default: "."
  output:
    description: "Comma-separated output formats (console, json, sarif, html, csv)."
    required: false
    default: "sarif"
  output-dir:
    description: "Directory for report files."
    required: false
    default: "credscan-reports"
  min-confidence:
    description: "Minimum confidence (0.0-1.0) to report a finding."
    required: false
    default: "0.5"
  exclude:
    description: "Comma-separated path patterns to skip."
    required: false
    default: ".git/,node_modules/,*.pyc"
  fail-on-findings:
    description: "Fail the job (exit 1) if any credentials are found."
    required: false
    default: "true"

outputs:
  sarif-file:
    description: "Path to the generated SARIF report (if sarif output was requested)."
    value: ${{ steps.scan.outputs.sarif-file }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install CredScan
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: pip install "$ACTION_PATH"

    - name: Run CredScan
      id: scan
      shell: bash
      # Inputs are passed through the environment, never interpolated directly
      # into the shell, to avoid command injection from untrusted input values.
      env:
        SCAN_PATH: ${{ inputs.path }}
        SCAN_OUTPUT: ${{ inputs.output }}
        SCAN_OUTPUT_DIR: ${{ inputs.output-dir }}
        SCAN_MIN_CONFIDENCE: ${{ inputs.min-confidence }}
        SCAN_EXCLUDE: ${{ inputs.exclude }}
        FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
      run: |
        set +e
        credscan \
          --path "$SCAN_PATH" \
          --output "$SCAN_OUTPUT" \
          --output-dir "$SCAN_OUTPUT_DIR" \
          --min-confidence "$SCAN_MIN_CONFIDENCE" \
          --exclude "$SCAN_EXCLUDE" \
          --no-color
        code=$?

        sarif=$(ls "$SCAN_OUTPUT_DIR"/*.sarif 2>/dev/null | head -1 || true)
        echo "sarif-file=$sarif" >> "$GITHUB_OUTPUT"

        if [ "$FAIL_ON_FINDINGS" = "true" ]; then
          exit $code
        fi
        exit 0
